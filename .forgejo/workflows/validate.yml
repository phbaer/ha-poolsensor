name: Validate frontend

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    # `docker` is Forgejo's standard runner label. The Node image also supplies
    # the runtime required by the checkout action and the syntax checks below.
    runs-on: docker
    container:
      image: node:24-bookworm
    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v6
      - name: Install build dependencies
        run: npm ci
      - name: Build and verify release asset
        run: |
          npm run build
          node --check dist/ha-poolsensor.js

  release:
    if: forge.event_name == 'push' && startsWith(forge.ref, 'refs/tags/v')
    needs: validate
    runs-on: docker
    container:
      image: node:24-bookworm
    steps:
      - name: Check out release tag
        uses: https://data.forgejo.org/actions/checkout@v6
      - name: Build release asset
        run: |
          npm ci
          npm run build -- release-assets/ha-poolsensor.js
      - name: Create release and upload assets
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          direction: upload
          release-dir: release-assets
          tag: ${{ forge.ref_name }}
          title: ${{ forge.ref_name }}
          token: ${{ forge.token }}
