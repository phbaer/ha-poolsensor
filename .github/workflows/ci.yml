name: CI

on:
  pull_request:
  push:

jobs:
  validate:
    name: Validate card
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: node --check ha-poolsensor.js
