name: HACS frontend

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to package"
        required: true
        type: string
      tag:
        description: "Unique release tag to publish"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: hacs/action@main
        with:
          category: plugin
          # GitHub repository metadata and Home Assistant Brands are external.
          ignore: brands images license topics

  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          target_commitish: ${{ inputs.ref || github.sha }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' || contains(github.ref_name, '-') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
          files: ha-poolsensor.js
